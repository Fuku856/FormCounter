# 配布用 zip を作って GitHub Release に添付する。
# Actions タブから手動で実行し、タグ名を入力する。
#
#   新しくリリースする … main から実行し、新しいタグ名を入力。
#                        manifest の version をそれに合わせて更新し、
#                        コミット・タグ作成・Release までまとめて行う。
#   やり直す           … 既に同名のタグがある場合は何も書き換えず、
#                        そのタグの内容で zip を作り直して差し替える。
#
# zip は「パッケージ化されていない拡張機能を読み込む」で使う。展開したフォルダを
# そのまま指定できるよう、余計なファイルは入れない。
name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'タグ名（例: v0.2.1）。無ければ manifest の version をこれに合わせて作成します'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # 既存タグの有無を判定するため全履歴が要る

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: タグ名を検査し、既存かどうか判定する
        id: tag
        run: |
          tag='${{ inputs.tag }}'
          case "$tag" in
            v[0-9]*) ;;
            *) echo "タグは v+数字 で始めてください（入力: $tag）" >&2; exit 1 ;;
          esac
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "タグ $tag は既にあります。version は変更せず zip を作り直します。"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "タグ $tag は未作成です。version を ${tag#v} に上げて作成します。"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: 既存タグの内容を取り出す
        if: steps.tag.outputs.exists == 'true'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          git checkout --detach "$TAG"
          actual=$(node -p "require('./manifest.json').version")
          if [ "$actual" != "$VERSION" ]; then
            echo "タグ $TAG の manifest の version は $actual で、タグ名と一致しません。" >&2
            exit 1
          fi

      - name: version を上げる
        if: steps.tag.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          # コミットを積むのでブランチから実行されている必要がある。
          if [ "${{ github.ref_type }}" != "branch" ]; then
            echo "新しいタグを作るときは、タグではなくブランチ（main）から実行してください。" >&2
            exit 1
          fi
          current=$(node -p "require('./manifest.json').version")
          if [ "$current" = "$VERSION" ]; then
            # 手元で先に上げてあった場合。何もしないでタグ付けに進む。
            echo "manifest は既に $VERSION です。version は変更しません。"
          else
            # 現在の version 以下ならここで失敗する（下げると配布物が紛らわしくなる）。
            node tools/bump-version.js "$VERSION"
          fi

      # 検証は push より前に行う。ここで落ちれば main もタグも汚れない。
      - name: 検証
        run: |
          node tools/check-manifest.js
          node tests/run.js

      - name: コミットしてタグを作る
        if: steps.tag.outputs.exists == 'false'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "version の変更はありません。現在の HEAD にタグを作ります。"
          else
            git commit -am "v$VERSION"
          fi
          git tag -a "$TAG" -m "$TAG"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "$TAG"
          echo "::notice::${{ github.ref_name }} に v$VERSION を積みました。手元で git pull してください。"

      - name: zip を作る
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          mkdir -p dist/formcounter
          cp -r manifest.json _locales icons src dist/formcounter/
          (cd dist && zip -qr "formcounter-${VERSION}.zip" formcounter)
          # 空の zip を配ってしまうと、展開しても読み込めない紛らわしい失敗になる。
          test -s "dist/formcounter-${VERSION}.zip"
          unzip -l "dist/formcounter-${VERSION}.zip"

      - name: Release に添付する
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          asset="dist/formcounter-${VERSION}.zip"
          if gh release view "$TAG" >/dev/null 2>&1; then
            # やり直し時に古い zip が残らないよう上書きする。
            gh release upload "$TAG" "$asset" --clobber
          else
            gh release create "$TAG" "$asset" --title "$TAG" --generate-notes
          fi
