# v* タグの push で .crx を署名・公開し、Chrome の自動更新用 update.xml を配信する。
# 手順の全体像は docs/RELEASE.md を参照。
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # Release の作成
  pages: write      # update.xml の配信
  id-token: write   # deploy-pages の OIDC

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: manifest.json を検証
        run: node tools/check-manifest.js

      - name: タグと manifest の version が一致するか確認
        id: version
        run: |
          version=$(node -p "require('./manifest.json').version")
          tag=${GITHUB_REF_NAME#v}
          if [ "$version" != "$tag" ]; then
            echo "タグ $GITHUB_REF_NAME に対し manifest の version は $version です。" >&2
            echo "node tools/bump-version.js $tag を実行してからタグを打ち直してください。" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: 配布物だけを集める
        run: |
          # crx3 は -x の出力先ディレクトリを作らないので、ここで用意しておく。
          mkdir -p dist/pkg dist/site
          cp -r manifest.json _locales icons src dist/pkg/

      - name: .crx に署名し update.xml を生成
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          # 鍵はワークスペース外に置き、成果物に混ざらないようにする。
          umask 077
          printf '%s' "$CRX_PRIVATE_KEY" > "$RUNNER_TEMP/crx.pem"
          version=${{ steps.version.outputs.version }}
          crx_url="${{ github.server_url }}/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/formcounter-${version}.crx"
          npx --yes crx3 \
            -o "dist/formcounter-${version}.crx" \
            -p "$RUNNER_TEMP/crx.pem" \
            -x dist/site/update.xml \
            --crxURL "$crx_url" \
            dist/pkg/manifest.json
          rm -f "$RUNNER_TEMP/crx.pem"
          # 生成漏れに気づかず空の Pages を配信すると、全端末の自動更新が止まる。
          test -s "dist/formcounter-${version}.crx"
          test -s dist/site/update.xml
          cat dist/site/update.xml

      - name: Release に .crx を添付
        uses: softprops/action-gh-release@v2
        with:
          files: dist/formcounter-*.crx

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

  # update.xml の配信。Release より後に出すと、Chrome が update.xml を見た
  # 時点で .crx が既に存在している状態になる。
  pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
